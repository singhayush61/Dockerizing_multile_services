services:
  client:
    image: "ayushsingh0/multi-client"
    mem_limit: 128m
    # Removed hostname; use service name 'client' instead

  api: # Changed key from 'server' to 'api' to match Nginx logic
    image: "ayushsingh0/multi-server"
    mem_limit: 128m
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
      - PGUSER=$PGUSER
      - PGHOST=$PGHOST
      - PGDATABASE=$PGDATABASE
      - PGPASSWORD=$PGPASSWORD
      - PGPORT=$PGPORT

  worker:
    image: "ayushsingh0/multi-worker"
    mem_limit: 128m
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
    # Added this if you have a redis service:
    # depends_on:
    #   - redis 

  nginx:
    image: "ayushsingh0/multi-nginx"
    mem_limit: 128m
    ports:
      - "80:80"
    depends_on:
      - client
      - api # Matches the updated service name above