version: "3"
services:
  redis:
    image: 'valkey/valkey:latest'
    mem_limit: 128m

  postgres:
    image: 'postgres:latest'
    mem_limit: 128m
    environment:
      - POSTGRES_PASSWORD=$PGPASSWORD # AWS will inject this from Environment Properties
  client:
    image: "ayushsingh0/multi-client"
    mem_limit: 128m
    hostname: client
  server:
    image: "ayushsingh0/multi-server"
    mem_limit: 128m
    hostname: api
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
      - PGUSER=$PGUSER
      - PGHOST=$PGHOST
      - PGDATABASE=$PGDATABASE
      - PGPASSWORD=$PGPASSWORD
      - PGPORT=$PGPORT
  worker:
    image: "ayushsingh0/multi-worker"
    mem_limit: 128m
    hostname: worker
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
  nginx:
    image: "ayushsingh0/multi-nginx"
    mem_limit: 128m
    hostname: nginx
    ports:
      - "80:80"
    depends_on:
      - client
      - server