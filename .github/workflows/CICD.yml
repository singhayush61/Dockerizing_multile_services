name: Deploy Multi-Container
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Build the test image for the React client
      - name: Build Test Image
        run: docker build -t ayush/react-test -f ./client/Dockerfile.dev ./client
      
      # 2. Run tests (CI=true ensures it doesn't hang)
      - name: Run Tests
        run: docker run -e CI=true ayush/react-test npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 3. Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build Production Images
      - name: Build Production Images
        run: |
          docker build -t ${{ secrets.DOCKER_ID }}/multi-client ./client
          docker build -t ${{ secrets.DOCKER_ID }}/multi-nginx ./nginx
          docker build -t ${{ secrets.DOCKER_ID }}/multi-server ./server
          docker build -t ${{ secrets.DOCKER_ID }}/multi-worker ./worker

      # 5. Push Images to Docker Hub
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_ID }}/multi-client
          docker push ${{ secrets.DOCKER_ID }}/multi-nginx
          docker push ${{ secrets.DOCKER_ID }}/multi-server
          docker push ${{ secrets.DOCKER_ID }}/multi-worker

      # 6. Deploy to AWS Elastic Beanstalk
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: docker-multi-service # Change to your EB App Name
          environment_name: Docker-multi-service-env  # Change to your EB Env Name
          region: us-east-1
          version_label: ${{ github.sha }}
          deployment_package: docker-compose.yml
   